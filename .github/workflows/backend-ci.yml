name: Backend CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: backend

      - name: RuboCop
        working-directory: backend
        run: bundle exec rubocop

      - name: Tests
        working-directory: backend
        run: bundle exec rake test
